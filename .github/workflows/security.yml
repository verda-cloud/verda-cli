name: Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "vhs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "vhs/**"
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: GoSec (via golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0

      - name: Run gosec via golangci-lint
        # --default=none + -E gosec scopes this step to gosec findings only.
        # Without --default=none, golangci-lint's "standard" linter set
        # (errcheck, govet, staticcheck, ...) also runs, which duplicates
        # `make lint` and bypasses the project's test-file exclusions in
        # .golangci.yaml — producing noise unrelated to security.
        run: golangci-lint run --no-config --default=none -E gosec ./...

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: false

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  trivy:
    name: Trivy (vulnerability & misconfiguration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,misconfig,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"

  osv-scanner:
    name: OSV Scanner (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.1.0
        with:
          scan-args: |-
            --recursive
            .

  security-success:
    name: All Security Checks Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [gosec, gitleaks, trivy, osv-scanner]
    steps:
      - name: Check results
        run: |
          for result in "${{ needs.gosec.result }}" "${{ needs.gitleaks.result }}" "${{ needs.trivy.result }}" "${{ needs.osv-scanner.result }}"; do
            if [ "$result" != "success" ]; then
              echo "One or more security checks failed"
              exit 1
            fi
          done
          echo "All security checks passed!"
