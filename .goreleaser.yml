version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: verda
    binary: verda
    main: ./cmd/verda/
    ldflags:
      - -s -w -X github.com/verda-cloud/verdagostack/pkg/version.gitVersion={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: verda_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: verda_{{ .Version }}_SHA256SUMS

brews:
  - repository:
      owner: verda-cloud
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/verda-cloud/verda-cli
    description: Verda CLI
    license: Apache-2.0

scoops:
  - repository:
      owner: verda-cloud
      name: homebrew-tap
    directory: bucket
    homepage: https://github.com/verda-cloud/verda-cli
    description: Verda CLI
    license: Apache-2.0

nfpms:
  - id: verda
    package_name: verda
    homepage: https://github.com/verda-cloud/verda-cli
    maintainer: Verda Cloud <support@verda.cloud>
    description: Verda CLI
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

